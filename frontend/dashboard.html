<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pantau saldo dan riwayat transaksi akun Premium Store kamu.">
<title>Dashboard — Premium Store</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%230b1220%27/%3E%3Cpath d=%27M16 4L26 9V16C26 21.8 21.8 26.8 16 28.4C10.2 26.8 6 21.8 6 16V9L16 4Z%27 fill=%27%233b8eff%27/%3E%3Cpath d=%27M11.5 16.3L14.6 19.4L20.5 12.5%27 stroke=%27white%27 stroke-width=%272.2%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 fill=%27none%27/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="glow-bg">
    <div class="glow-orb a"></div>
    <div class="glow-orb b"></div>
    <div class="grid-overlay"></div>
  </div>

  <header class="topbar">
    <div class="container topbar-inner">
      <span class="brand">
        <span class="logo-ring">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L20 6.5V12C20 16.6 16.6 20.6 12 22C7.4 20.6 4 16.6 4 12V6.5L12 2Z" stroke="#5ec8ff" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M8.5 12.2L10.8 14.5L15.5 9.5" stroke="#5ec8ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Premium Store
      </span>
      <nav class="nav-links">
        <a href="produk.html">Beli Akun</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="topup.html">Topup</a>
        <a href="profile.html">Profil</a>
        <a href="#" id="navAdmin" class="hidden">Admin</a>
      </nav>
      <div class="user-chip">
        <span class="avatar" id="avatarInitials">--</span>
        <span id="chipName">Memuat...</span>
        <button class="btn-sm btn-ghost" id="btnLogout" style="padding:6px 12px; border-radius:999px;">Keluar</button>
      </div>
    </div>
  </header>

  <main class="container page">
    <div class="page-header fade-in">
      <span class="eyebrow">Ringkasan Akun</span>
      <h1 id="greeting">Halo 👋</h1>
    </div>

    <section class="balance-card fade-in">
      <p>Saldo tersedia</p>
      <div class="balance-amount" id="balanceAmount">Rp0</div>
      <div class="flex gap-12 mt-24">
        <a href="topup.html" class="btn btn-primary" style="width:auto; padding:12px 22px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="#051022" stroke-width="2.2" stroke-linecap="round"/></svg>
          <span>Topup Saldo</span>
        </a>
        <a href="profile.html" class="btn btn-ghost" style="width:auto; padding:12px 22px;">Kelola akun</a>
      </div>

      <div class="stat-grid">
        <div class="stat-box">
          <p class="text-sm">Perangkat aktif</p>
          <div class="value" id="statDevices">-</div>
        </div>
        <div class="stat-box">
          <p class="text-sm">Total transaksi</p>
          <div class="value" id="statTrxCount">-</div>
        </div>
        <div class="stat-box">
          <p class="text-sm">Bergabung sejak</p>
          <div class="value" id="statJoined" style="font-size:15px;">-</div>
        </div>
      </div>
    </section>

    <div class="page-header mt-32">
      <span class="eyebrow">Aktivitas Terbaru</span>
      <h2 style="font-size:20px;">Riwayat transaksi</h2>
    </div>

    <div class="table-wrap fade-in">
      <table>
        <thead>
          <tr><th>Tanggal</th><th>Jenis</th><th>Jumlah</th><th>Status</th></tr>
        </thead>
        <tbody id="trxBody">
          <tr><td colspan="4"><div class="skeleton" style="height:18px;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
