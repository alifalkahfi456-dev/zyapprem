<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Masuk atau daftar untuk mulai belanja akun premium terpercaya.">
<title>Masuk — Premium Store</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%230b1220%27/%3E%3Cpath d=%27M16 4L26 9V16C26 21.8 21.8 26.8 16 28.4C10.2 26.8 6 21.8 6 16V9L16 4Z%27 fill=%27%233b8eff%27/%3E%3Cpath d=%27M11.5 16.3L14.6 19.4L20.5 12.5%27 stroke=%27white%27 stroke-width=%272.2%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 fill=%27none%27/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="glow-bg">
    <div class="glow-orb a"></div>
    <div class="glow-orb b"></div>
    <div class="glow-orb c"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="center-screen">
    <div style="width:100%; max-width:420px;" class="fade-in">
      <div style="text-align:center; margin-bottom:28px;">
        <span class="brand" style="justify-content:center; display:flex;">
          <span class="logo-ring">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L20 6.5V12C20 16.6 16.6 20.6 12 22C7.4 20.6 4 16.6 4 12V6.5L12 2Z" stroke="#5ec8ff" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M8.5 12.2L10.8 14.5L15.5 9.5" stroke="#5ec8ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          Premium Store
        </span>
        <p class="mt-8">Akses akun premium favoritmu, dalam satu tempat.</p>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" id="tabLogin">Masuk</button>
          <button class="tab" id="tabRegister">Daftar</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="formLogin">
          <div class="field">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="nama@email.com" required autocomplete="email">
          </div>
          <div class="field">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary" id="btnLogin">
            <span>Masuk</span>
          </button>
        </form>

        <!-- REGISTER FORM -->
        <form id="formRegister" class="hidden">
          <div class="field">
            <label for="regName">Nama lengkap</label>
            <input type="text" id="regName" placeholder="Nama kamu" required autocomplete="name">
          </div>
          <div class="field">
            <label for="regEmail">Email</label>
            <input type="email" id="regEmail" placeholder="nama@email.com" required autocomplete="email">
          </div>
          <div class="field">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary" id="btnRegister">
            <span>Buat akun</span>
          </button>
        </form>

        <p class="text-sm mt-16" style="text-align:center;">
          Dengan melanjutkan, kamu setuju pada ketentuan layanan kami.
        </p>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
