<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kelola informasi akun dan keamanan Premium Store kamu.">
<title>Profil — Premium Store</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%230b1220%27/%3E%3Cpath d=%27M16 4L26 9V16C26 21.8 21.8 26.8 16 28.4C10.2 26.8 6 21.8 6 16V9L16 4Z%27 fill=%27%233b8eff%27/%3E%3Cpath d=%27M11.5 16.3L14.6 19.4L20.5 12.5%27 stroke=%27white%27 stroke-width=%272.2%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 fill=%27none%27/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="glow-bg">
    <div class="glow-orb a"></div>
    <div class="glow-orb b"></div>
    <div class="grid-overlay"></div>
  </div>

  <header class="topbar">
    <div class="container topbar-inner">
      <span class="brand">
        <span class="logo-ring">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L20 6.5V12C20 16.6 16.6 20.6 12 22C7.4 20.6 4 16.6 4 12V6.5L12 2Z" stroke="#5ec8ff" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M8.5 12.2L10.8 14.5L15.5 9.5" stroke="#5ec8ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Premium Store
      </span>
      <nav class="nav-links">
        <a href="produk.html">Beli Akun</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="topup.html">Topup</a>
        <a href="profile.html" class="active">Profil</a>
        <a href="#" id="navAdmin" class="hidden">Admin</a>
      </nav>
      <div class="user-chip">
        <span class="avatar" id="avatarInitials">--</span>
        <span id="chipName">Memuat...</span>
        <button class="btn-sm btn-ghost" id="btnLogout" style="padding:6px 12px; border-radius:999px;">Keluar</button>
      </div>
    </div>
  </header>

  <main class="container page">
    <div class="page-header fade-in">
      <span class="eyebrow">Pengaturan Akun</span>
      <h1>Profil saya</h1>
    </div>

    <div class="grid-2">
      <div class="card fade-in">
        <h3 style="font-size:16px; margin-bottom:20px;">Informasi akun</h3>
        <form id="formProfile">
          <div class="field">
            <label>Nama lengkap</label>
            <input type="text" id="profName" required>
          </div>
          <div class="field">
            <label>Email</label>
            <input type="email" id="profEmail" disabled>
          </div>
          <button type="submit" class="btn btn-primary" id="btnSaveProfile"><span>Simpan perubahan</span></button>
        </form>
      </div>

      <div class="card fade-in">
        <h3 style="font-size:16px; margin-bottom:20px;">Ubah password</h3>
        <form id="formPassword">
          <div class="field">
            <label>Password saat ini</label>
            <input type="password" id="currentPassword" required>
          </div>
          <div class="field">
            <label>Password baru</label>
            <input type="password" id="newPassword" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-primary" id="btnSavePassword"><span>Ubah password</span></button>
        </form>
      </div>
    </div>

    <div class="card mt-24 fade-in">
      <div class="flex-between">
        <div>
          <h3 style="font-size:16px;">Keamanan perangkat</h3>
          <p class="text-sm mt-8" id="deviceInfo">Memuat...</p>
        </div>
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="#5ec8ff" stroke-width="1.5"/><path d="M11 18H13" stroke="#5ec8ff" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
